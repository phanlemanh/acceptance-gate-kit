<!doctype html><html><head><meta charset=utf8><style>
:root{--ink:oklch(0.22 0.02 250);--bg:oklch(0.99 0.004 250);--surface:oklch(0.97 0.006 250);--accent:oklch(0.55 0.15 250)}
body{background:var(--bg);color:var(--ink);font-family:"Iowan Old Style",Palatino,serif;margin:0;padding:64px;line-height:1.6}
h1{font-size:2.75rem;letter-spacing:-0.02em;text-wrap:balance;margin:0 0 16px}
.lead{max-width:68ch;color:var(--ink)}
.cta{background:var(--accent);color:white;padding:12px 22px;border:none;border-radius:8px;font:inherit}
</style></head><body>
<h1>A calm place to think</h1>
<p class=lead>Notes that stay out of your way until you need them. Built for focus, not features.</p>
<button class=cta>Start writing</button>
</body></html>
