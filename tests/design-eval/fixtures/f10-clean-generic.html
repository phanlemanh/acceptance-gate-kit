<!doctype html><html><head><meta charset=utf8><style>
:root{--ink:#1a1a2e;--accent:#4f46e5}
body{font-family:system-ui;color:var(--ink);margin:0;text-align:center}
.hero{padding:96px 24px}
.hero h1{font-size:3rem;letter-spacing:-0.02em;margin:0 0 16px}
.hero p{color:#475569;max-width:60ch;margin:0 auto 24px}
.btns button{padding:12px 24px;border-radius:8px;font:inherit;margin:0 6px;border:1px solid var(--accent)}
.primary{background:var(--accent);color:#fff}
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:48px 24px;max-width:1000px;margin:0 auto}
</style></head><body>
<section class=hero>
<h1>The all-in-one platform for modern teams</h1>
<p>Streamline your workflow, boost productivity, and scale with confidence.</p>
<div class=btns><button class=primary>Get started free</button><button>Book a demo</button></div>
</section>
<section class=feat>
<div><h3>Powerful</h3><p>Everything you need in one place.</p></div>
<div><h3>Flexible</h3><p>Adapts to how your team works.</p></div>
<div><h3>Secure</h3><p>Enterprise-grade security built in.</p></div>
</section>
</body></html>
